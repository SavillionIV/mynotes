<html>
	<head>
		<style>
			.layout{
			display:grid;
			grid-template-columns:200px 1fr 200px;
			grid-template-rows:auto 1fr auto;
			grid-template-areas:
			"header header header"
			"nav main aside"
			"footer footer footer";
			height:100vh;
			}
			header{grid-area:header;}
			nav{grid-area:nav;}
			main{grid-area:main;}
			aside{grid-area:aside;}
			footer{grid-area:footer;}
		</style>
	</head>
	<body>
		<div class="layout">
			<header>Header</header>
			<nav>Menu</nav>
			<main>Content</main>
			<aside>Sidebar</aside>
			<footer>Footer</footer>
		</div>
	</body>
</html>
